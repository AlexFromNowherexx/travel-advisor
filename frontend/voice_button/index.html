<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://cdn.jsdelivr.net/npm/streamlit-component-lib@1.4.0/dist/streamlit-component-lib.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        .container {
            display: flex;
            align-items: center;
            gap: 12px;
            height: 40px;
        }
        button {
            background-color: #ff4b4b;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background-color 0.2s ease, transform 0.1s ease;
            height: 35px;
        }
        button:hover {
            background-color: #e03e3e;
        }
        button:active {
            transform: scale(0.98);
        }
        button:disabled {
            background-color: #555555;
            color: #aaaaaa;
            cursor: not-allowed;
        }
        #status {
            font-size: 13px;
            color: #888888;
            font-style: italic;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 300px;
        }
        /* Animated Waveform */
        .waveform {
            display: none;
            align-items: center;
            gap: 3px;
            height: 16px;
            width: 25px;
        }
        .bar {
            width: 3px;
            height: 100%;
            background-color: #ff4b4b;
            border-radius: 2px;
            animation: bounce 0.6s ease-in-out infinite alternate;
            transform-origin: bottom;
        }
        .bar:nth-child(2) { animation-delay: 0.15s; }
        .bar:nth-child(3) { animation-delay: 0.3s; }
        .bar:nth-child(4) { animation-delay: 0.45s; }

        @keyframes bounce {
            0% { transform: scaleY(0.2); }
            100% { transform: scaleY(1.0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <button id="voice-btn">🎙️ Click to Speak</button>
        <div id="waveform" class="waveform">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
        <div id="status"></div>
    </div>
    <script>
        // Streamlit communication helpers
        function sendMessage(type, data) {
            const message = {
                isStreamlitMessage: true,
                type: type,
                ...data
            };
            window.parent.postMessage(message, "*");
        }

        function setFrameHeight(height) {
            sendMessage("streamlit:setFrameHeight", { height: height });
        }

        function setComponentValue(value) {
            sendMessage("streamlit:setComponentValue", { value: value });
        }

        // Notify Streamlit parent that component is ready
        sendMessage("streamlit:componentReady", { apiVersion: 1 });

        // Listen to messages from Streamlit
        window.addEventListener("message", (event) => {
            if (event.data && event.data.type === "streamlit:render") {
                setFrameHeight(40);
            }
        });

        const button = document.getElementById("voice-btn");
        const statusDiv = document.getElementById("status");
        const waveform = document.getElementById("waveform");

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            button.disabled = true;
            button.innerText = "🎙️ Voice Unsupported";
            statusDiv.style.color = "#ff4b4b";
            statusDiv.innerText = "Web Speech API is not supported in this browser.";
        } else {
            const recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            let listening = false;

            button.addEventListener("click", () => {
                if (!listening) {
                    recognition.start();
                } else {
                    recognition.stop();
                }
            });

            recognition.onstart = () => {
                listening = true;
                button.innerText = "🛑 Stop";
                button.style.backgroundColor = "#e03e3e";
                statusDiv.style.color = "#888888";
                statusDiv.innerText = "Listening...";
                waveform.style.display = "flex";
            };

            recognition.onend = () => {
                listening = false;
                button.innerText = "🎙️ Click to Speak";
                button.style.backgroundColor = "#ff4b4b";
                statusDiv.innerText = "";
                waveform.style.display = "none";
            };

            recognition.onerror = (event) => {
                console.error("Speech recognition error", event.error);
                statusDiv.style.color = "#ff4b4b";
                waveform.style.display = "none";
                if (event.error === 'not-allowed') {
                    statusDiv.innerText = "Permission denied.";
                } else {
                    statusDiv.innerText = "Error: " + event.error;
                }
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                statusDiv.style.color = "#2e7d32";
                statusDiv.innerText = "Heard: " + transcript;
                waveform.style.display = "none";
                setComponentValue({
                    text: transcript,
                    timestamp: Date.now()
                });
            };
        }
    </script>
</body>
</html>
